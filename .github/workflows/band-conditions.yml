# GENERATED by control-center/scripts/build-web.mjs - do not hand-edit.
# Refreshes band-conditions.json from hamqsl hourly and mirrors it to main + gh-pages
# (matching the manual deploy's dual push), so the standalone band tile shows the
# same parsed table as the kiosk. Deploys from a laptop must `git pull --rebase`
# first, since this bot advances origin/main.
name: Band conditions
on:
  schedule:
    - cron: "25 * * * *"
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: band-conditions
  cancel-in-progress: false
jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { ref: main, fetch-depth: 0 }
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - run: node fetch-bands.mjs
      - name: Commit + mirror to main and gh-pages
        run: |
          if git diff --quiet -- band-conditions.json; then echo "no change"; exit 0; fi
          git config user.name "band-conditions-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add band-conditions.json
          git commit -m "chore: refresh band conditions"
          git pull --rebase origin main
          git push origin HEAD:main
          git push origin HEAD:gh-pages
